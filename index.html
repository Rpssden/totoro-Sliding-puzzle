<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="Viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Puzzle</title>
    <link rel="stylesheet" href="Puzzle.css">
    <script src="Puzzle.js"></script>
  </head>

  <body>
    <img id="title" src="Logo.png" alt="Game Logo">
    <h1>Turns: <span id="turns">0</span></h1>
    <div id="board"></div>
    <h2 id="congratsMessage">🎉 Congratulations! Puzzle Solved! 🎉</h2>
    <div class="buttons">
      <button id="retryButton" class="button">Retry</button>
      <button id="nextButton" class="button">Next</button>
    </div>
  </body>
</html>
